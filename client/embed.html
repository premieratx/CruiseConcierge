<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premier Party Cruises Embed Widget</title>
    <meta name="description" content="Book your party cruise directly through our booking widget" />
    
    <!-- Optimized for embedding -->
    <meta name="robots" content="noindex, nofollow">
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, sans-serif;
      }
      
      /* Ensure clean iframe appearance */
      html, body, #root {
        height: 100%;
        overflow-x: hidden;
      }
      
      /* Loading state */
      .embed-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
      }
      
      .embed-loading::after {
        content: "Loading...";
        font-size: 16px;
        color: #374151;
        animation: pulse 2s infinite;
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="embed-loading"></div>
    </div>
    <script type="module" src="/src/embed-main.tsx"></script>
  </body>
</html>
