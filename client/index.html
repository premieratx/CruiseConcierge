<!DOCTYPE html>
<html lang="en">
  <head>

    <!-- FAQ Schema and other structured data injected by React Helmet per page for unique SEO -->

    <!-- Branding & Theme -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#00d4ff" />
    
    <!-- Critical resource hints for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    
    
    <!-- Preload critical LCP images with responsive sizes -->
    <link rel="preload" as="image" href="/assets/bachelor-party-group-guys-ZmRSFQB_.webp" 
          imagesrcset="/assets/bachelor-party-group-guys-ZmRSFQB_.webp 1920w"
          imagesizes="100vw" 
          fetchpriority="high" type="image/webp" />
    
    <!-- Preload critical font files directly for faster text rendering -->
    <link rel="preload" href="https://fonts.gstatic.com/s/dmsans/v15/rP2Cp2ywxg089UriASitCBimC3YU-CnE6Q.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="https://fonts.gstatic.com/s/bebasneu/v16/JTUSjIg69CK48gW7PXoo9WdhyyTh89ZNpQ.woff2" as="font" type="font/woff2" crossorigin>
    
    <!-- CRITICAL CLS FIX: Load fonts with display=swap to prevent layout shift -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Bebas+Neue&family=Oswald:wght@400;600;700&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Bebas+Neue&family=Oswald:wght@400;600;700&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"></noscript>
    
    <!-- Inline critical CSS for instant layout stability (prevents CLS) -->
    <style>
      /* Critical layout stability - applied immediately before any content renders */
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
      }
      
      #root {
        min-height: 100vh;
        /* Prevent layout shift during hydration */
        contain: layout style paint;
      }
      
      /* SSR content will be hidden by inline script after this */
      .ssr-content {
        /* Visible to crawlers until JS loads */
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- PREVIEW FIX: Force hard reload if React preamble error detected -->
    <script>
      // Detect React preamble errors and force cache clear
      const originalError = window.onerror;
      window.onerror = function(message, source, lineno, colno, error) {
        if (message && message.includes && message.includes("can't detect preamble")) {
          console.warn('[CACHE FIX] React preamble error detected - forcing hard reload to clear cache...');
          // Use location.replace instead of reload to avoid reload loop
          if (!sessionStorage.getItem('preamble_reload_attempted')) {
            sessionStorage.setItem('preamble_reload_attempted', '1');
            location.reload(true); // Hard reload bypasses cache
          } else {
            console.error('[CACHE FIX] Preamble reload already attempted. Please manually clear browser cache (Ctrl+Shift+R or Cmd+Shift+R)');
          }
          return true;
        }
        return originalError ? originalError.apply(this, arguments) : false;
      };
    </script>
    
    <!-- Conditionally disable Vite overlay and runtime error modal for embed routes -->
    <script type="module">
      if (location.pathname.startsWith('/embed/')) {
        // Disable Vite's built-in overlay
        import('/@vite/client?overlay=false');
        
        // Disable runtime error overlay by intercepting error handlers
        // This prevents the @replit/vite-plugin-runtime-error-modal from showing overlays
        const originalError = window.onerror;
        const originalUnhandledRejection = window.onunhandledrejection;
        
        // Override global error handlers to prevent error overlays in embed routes
        window.onerror = function(message, source, lineno, colno, error) {
          // Log errors to console but don't show overlay
          console.error('Runtime Error in Embed:', { message, source, lineno, colno, error });
          return true; // Prevent default error handling
        };
        
        window.onunhandledrejection = function(event) {
          // Log promise rejections but don't show overlay
          console.error('Unhandled Promise Rejection in Embed:', event.reason);
          event.preventDefault(); // Prevent default unhandled rejection handling
          return true;
        };
        
        // Also prevent any existing error overlay elements from being created
        const originalCreateElement = document.createElement;
        document.createElement = function(tagName) {
          const element = originalCreateElement.call(this, tagName);
          
          // Intercept creation of overlay-related elements
          if (element.tagName === 'DIV' && 
              (element.className && (
                element.className.includes('error-overlay') || 
                element.className.includes('runtime-error') ||
                element.className.includes('vite-error-overlay')
              ))) {
            // Return a dummy element that won't be displayed
            const dummyElement = originalCreateElement.call(this, 'div');
            dummyElement.style.display = 'none';
            return dummyElement;
          }
          
          return element;
        };
        
        // Clean up any existing error overlays that might already be present
        document.addEventListener('DOMContentLoaded', function() {
          // Remove any existing error overlay elements
          const overlays = document.querySelectorAll('[class*="error-overlay"], [class*="runtime-error"], [class*="vite-error-overlay"]');
          overlays.forEach(overlay => overlay.remove());
          
          // Add CSS to hide any error overlays that might still appear
          const style = document.createElement('style');
          style.textContent = `
            /* Hide runtime error overlays in embed routes */
            [class*="error-overlay"],
            [class*="runtime-error"],
            [class*="vite-error-overlay"],
            .vite-error-overlay,
            .runtime-error-modal {
              display: none !important;
              visibility: hidden !important;
              opacity: 0 !important;
              pointer-events: none !important;
            }
          `;
          document.head.appendChild(style);
        });
      }
    </script>
    <!-- Xola Checkout Script - CRITICAL: Load before React so widgets can initialize -->
    <script>
      (function() {
        var co = document.createElement("script");
        co.type = "text/javascript";
        co.async = true;
        co.src = "https://xola.com/checkout.js";
        var s = document.getElementsByTagName("script")[0];
        s.parentNode.insertBefore(co, s);
      })();
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
