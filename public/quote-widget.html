<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get Your Quote - Premier Party Cruises</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    #quote-widget-container {
      width: 100%;
      height: 100vh;
      position: relative;
    }
    
    #quote-iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    
    /* Loading state */
    #loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: opacity 0.5s ease-out;
    }
    
    #loading-overlay.loaded {
      opacity: 0;
      pointer-events: none;
    }
    
    .loading-content {
      text-align: center;
      color: white;
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loading-text {
      font-size: 18px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="quote-widget-container">
    <!-- Loading overlay -->
    <div id="loading-overlay">
      <div class="loading-content">
        <div class="spinner"></div>
        <div class="loading-text">Loading Quote Builder...</div>
      </div>
    </div>
    
    <!-- Main iframe -->
    <iframe 
      id="quote-iframe"
      src="https://ppc-quote-builder.lovable.app/"
      title="Premier Party Cruises Quote Builder"
      allow="payment; geolocation"
      allowfullscreen
    ></iframe>
  </div>

  <script>
    // Hide loading overlay once iframe loads
    const iframe = document.getElementById('quote-iframe');
    const loadingOverlay = document.getElementById('loading-overlay');
    
    iframe.addEventListener('load', function() {
      setTimeout(() => {
        loadingOverlay.classList.add('loaded');
      }, 300);
    });
    
    // Optional: Listen for messages from iframe for dynamic height
    window.addEventListener('message', function(event) {
      // Verify origin for security
      if (event.origin !== 'https://ppc-quote-builder.lovable.app') {
        return;
      }
      
      // Handle height updates if Lovable sends them
      if (event.data && event.data.type === 'resize') {
        iframe.style.height = event.data.height + 'px';
      }
    });
    
    // Handle errors
    iframe.addEventListener('error', function() {
      loadingOverlay.innerHTML = `
        <div class="loading-content">
          <div style="font-size: 24px; margin-bottom: 20px;">⚠️</div>
          <div class="loading-text">Unable to load quote builder</div>
          <div style="margin-top: 12px; font-size: 14px; opacity: 0.9;">
            Please refresh the page or contact us directly
          </div>
        </div>
      `;
    });
  </script>
</body>
</html>
