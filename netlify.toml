# Netlify build + runtime config for the V2 preview site.
#
# Goal: host the Vite-built static frontend on Netlify, but keep the Express
# backend (chat, forms, bookings) running on the live Replit app at
# premierpartycruises.com. All /api and /attached_assets traffic is proxied
# to that host so the preview uses the exact same backend as production.

[build]
  # Pre-build: fetch any assets not committed to git from the live CDN.
  # Vite build: produces dist/public (static frontend).
  # Post-build: copy attached_assets → dist/public/attached_assets so the
  # deploy is fully self-contained. No runtime proxy to Replit needed.
  # rsync excludes .zip archives and any filename containing # or ? (invalid in URLs / Netlify deploys).
  command = "bash scripts/fetch-build-assets.sh && node scripts/export-blog-static.mjs || echo 'blog export failed, using committed snapshot' && npx vite build --mode production && mkdir -p dist/public/attached_assets && rsync -a --exclude='*.zip' --exclude='*#*' --exclude='*\\?*' attached_assets/ dist/public/attached_assets/ && node scripts/generate-seo-files.mjs"
  publish = "dist/public"

[build.environment]
  NODE_VERSION = "20"

# ──────────────────────────────────────────────────────────────────────────
# Proxy API + backend-served assets to the live Replit backend.
# Netlify edge rewrites (status 200) are server-side — no CORS issues.
#
# ⚠️  CUTOVER REQUIRED BEFORE DNS FLIP ⚠️
# Today this targets `premierpartycruises.com` (Replit backend on the apex).
# The moment DNS on the apex flips to Netlify, this becomes a self-loop
# and every /api/* request dies (chat, blog, availability, admin, etc).
#
# BEFORE flipping apex DNS to Netlify:
#   1. Create CNAME: api.premierpartycruises.com → <replit-host>
#   2. Verify https://api.premierpartycruises.com/api/health returns 200
#   3. Swap the `to =` line below to the api.* subdomain
#   4. Commit + deploy V2
#   5. Only then flip apex DNS
# ──────────────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/api/*"
  to = "https://premierpartycruises.com/api/:splat"
  # to = "https://api.premierpartycruises.com/api/:splat"   # ← enable at cutover
  status = 200
  force = true

# ──────────────────────────────────────────────────────────────────────────
# /admin → SEO Command Center (separate Next.js app on Netlify)
# Site ID 843ba33c-5888-4098-bb8c-eb35889c1430, auto-deployed from GitHub
# Admin logs in via Supabase auth at /login; middleware protects the rest.
# ──────────────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/admin"
  to = "https://seo-command-center.netlify.app/login"
  status = 302
  force = true

[[redirects]]
  from = "/admin/*"
  to = "https://seo-command-center.netlify.app/:splat"
  status = 302
  force = true

# ──────────────────────────────────────────────────────────────────────────
# 301 redirects: -v2 preview URLs → canonical.
# During the V2 iteration we exposed pages at `/xxx-v2`. Those have now
# replaced the canonical URLs, so the -v2 slugs are duplicates. Redirect
# them server-side (301 permanent) so search engines and bookmarks land
# on the single canonical URL.
# ──────────────────────────────────────────────────────────────────────────
