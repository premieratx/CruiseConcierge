# Netlify build + runtime config for the V2 preview site.
#
# Goal: host the Vite-built static frontend on Netlify, but keep the Express
# backend (chat, forms, bookings) running on the live Replit app at
# premierpartycruises.com. All /api and /attached_assets traffic is proxied
# to that host so the preview uses the exact same backend as production.

[build]
  # Pre-build: fetch any assets not committed to git from the live CDN.
  # Vite build: produces dist/public (static frontend).
  # Post-build: copy attached_assets → dist/public/attached_assets so the
  # deploy is fully self-contained. No runtime proxy to Replit needed.
  command = "bash scripts/fetch-build-assets.sh && npx vite build --mode production && mkdir -p dist/public/attached_assets && cp -R attached_assets/. dist/public/attached_assets/ && node scripts/generate-seo-files.mjs"
  publish = "dist/public"

[build.environment]
  NODE_VERSION = "20"

# ──────────────────────────────────────────────────────────────────────────
# Proxy API + backend-served assets to the live Replit app.
# Netlify edge rewrites (status 200) are server-side — no CORS issues.
# ──────────────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/api/*"
  to = "https://premierpartycruises.com/api/:splat"
  status = 200
  force = true

# /attached_assets/* is now shipped with the build (see build command), so
# no proxy needed. Falls back to the 404 page if a file is missing.

# sitemap.xml + robots.txt are generated at build time by
# scripts/generate-seo-files.mjs and shipped in the bundle. No proxy needed.

# ──────────────────────────────────────────────────────────────────────────
# SPA fallback — wouter is a client-side router, so unknown paths should
# serve index.html and let the router resolve the route.
# This MUST be the last redirect.
# ──────────────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-term caching for hashed Vite assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
